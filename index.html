<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QR Yoklama</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Kamera görüntüsü canvas olarak gösterilir — video gizli */
    #display {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Tarama çerçevesi */
    #frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 16px;
      overflow: hidden;
      pointer-events: none;
    }

    #scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4fc3f7, #00e5ff, #4fc3f7, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 8px #00e5ff;
    }
    @keyframes scan {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #00e5ff;
      border-style: solid;
      z-index: 2;
    }
    .corner.tl { top: -1px; left: -1px;  border-width: 3px 0 0 3px; border-radius: 8px 0 0 0; }
    .corner.tr { top: -1px; right: -1px; border-width: 3px 3px 0 0; border-radius: 0 8px 0 0; }
    .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 8px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; border-radius: 0 0 8px 0; }

    #title {
      position: absolute;
      top: 48px; left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 17px; font-weight: 600;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.3px;
      pointer-events: none;
    }

    #status {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      padding: 0 24px;
      pointer-events: none;
    }

    /* Zoom göstergesi */
    #zoom-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #zoom-indicator.show { opacity: 1; }

    /* Fener butonu */
    #torch-btn {
      position: absolute;
      top: 48px; right: 20px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      font-size: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #torch-btn.on { background: rgba(255,220,0,0.35); }

    /* Başarı ekranı */
    #success {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #success.show { display: flex; }

    .checkmark {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #4caf50;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    #success p     { color: #fff; font-size: 16px; font-weight: 600; }
    #success small { color: rgba(255,255,255,0.55); font-size: 13px; }
  </style>
</head>
<body>

<div id="container">
  <!-- Kamera görüntüsü buraya çizilir, sabit frame -->
  <canvas id="display"></canvas>
  <canvas id="overlay-canvas"></canvas>

  <div id="frame">
    <div id="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="title">QR Kodu Tara</div>
  <button id="torch-btn">🔦</button>
  <div id="status">QR kodu çerçeve içine al</div>
  <div id="zoom-indicator">1.0×</div>

  <div id="success">
    <div class="checkmark">✓</div>
    <p>QR Okundu!</p>
    <small>Yoklama gönderiliyor...</small>
  </div>
</div>

<!-- Gizli video + QR tarama için gizli canvas -->
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.disableClosingConfirmation();

  const video         = document.getElementById('video');
  const display       = document.getElementById('display');
  const canvas        = document.getElementById('canvas');
  const overlayCanvas = document.getElementById('overlay-canvas');
  const statusEl      = document.getElementById('status');
  const successEl     = document.getElementById('success');
  const frameEl       = document.getElementById('frame');
  const torchBtn      = document.getElementById('torch-btn');
  const zoomIndicator = document.getElementById('zoom-indicator');
  const dCtx          = display.getContext('2d');                          // ekranda gösterilen
  const ctx           = canvas.getContext('2d', { willReadFrequently: true }); // QR tarama
  const overlayCtx    = overlayCanvas.getContext('2d');

  dCtx.imageSmoothingEnabled = true;
  dCtx.imageSmoothingQuality = 'high';

  let scanning      = true;
  let videoTrack    = null;
  let torchOn       = false;
  let frameSize     = 0;
  let frameX        = 0;
  let frameY        = 0;
  let currentZoom   = 1.0;
  let hwZoomMin     = 1.0;
  let hwZoomMax     = 6.0;
  let hwZoomSupport = false;
  let zoomHideTimer = null;

  // ── Çerçeve + overlay kurulumu ─────────────────────────────
  function setupFrame() {
    const sw = window.innerWidth;
    const sh = window.innerHeight;

    display.width        = sw;
    display.height       = sh;
    overlayCanvas.width  = sw;
    overlayCanvas.height = sh;

    dCtx.imageSmoothingEnabled = true;
    dCtx.imageSmoothingQuality = 'high';

    frameSize = Math.round(Math.min(sw, sh) * 0.68);
    frameEl.style.width  = frameSize + 'px';
    frameEl.style.height = frameSize + 'px';
    frameX = Math.round((sw - frameSize) / 2);
    frameY = Math.round((sh - frameSize) / 2);
    statusEl.style.top = (frameY + frameSize + 18) + 'px';

    drawOverlay();
  }

  function drawOverlay() {
    const sw = overlayCanvas.width;
    const sh = overlayCanvas.height;
    overlayCtx.clearRect(0, 0, sw, sh);
    overlayCtx.fillStyle = 'rgba(0,0,0,0.55)';
    overlayCtx.fillRect(0, 0, sw, sh);
    overlayCtx.clearRect(frameX, frameY, frameSize, frameSize);
  }

  window.addEventListener('resize', setupFrame);
  setupFrame();

  // ── Zoom uygula ────────────────────────────────────────────
  function applyZoom(z) {
    currentZoom = z;
    if (hwZoomSupport && videoTrack) {
      videoTrack.applyConstraints({ advanced: [{ zoom: z }] }).catch(() => {});
    }
    // Gösterge
    zoomIndicator.textContent = z.toFixed(1) + '×';
    zoomIndicator.classList.add('show');
    clearTimeout(zoomHideTimer);
    zoomHideTimer = setTimeout(() => zoomIndicator.classList.remove('show'), 1500);
  }

  // ── Pinch-to-zoom ──────────────────────────────────────────
  let pinchDist0 = null;
  let pinchZoom0 = 1.0;

  function touchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.hypot(dx, dy);
  }

  document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchDist0 = touchDist(e.touches[0], e.touches[1]);
      pinchZoom0 = currentZoom;
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && pinchDist0 !== null) {
      const ratio  = touchDist(e.touches[0], e.touches[1]) / pinchDist0;
      const zMin   = hwZoomSupport ? hwZoomMin : 1.0;
      const zMax   = hwZoomSupport ? hwZoomMax : 5.0;
      const newZoom = Math.max(zMin, Math.min(zMax, pinchZoom0 * ratio));
      if (Math.abs(newZoom - currentZoom) >= 0.01) applyZoom(newZoom);
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (e.touches.length < 2) pinchDist0 = null;
  }, { passive: true });

  // ── Kamerayı başlat ───────────────────────────────────────
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: 'environment' },
      width:      { ideal: 1920 },
      height:     { ideal: 1080 },
      frameRate:  { ideal: 30, max: 30 }
    }
  })
  .catch(() => navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: 'environment' },
      width:      { ideal: 1280 },
      height:     { ideal: 720 }
    }
  }))
  .then(stream => {
    video.srcObject = stream;
    videoTrack = stream.getVideoTracks()[0];

    const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};

    // Sürekli otofokus / pozlama / beyaz denge
    const adv = {};
    if (caps.focusMode?.includes('continuous'))        adv.focusMode        = 'continuous';
    if (caps.exposureMode?.includes('continuous'))     adv.exposureMode     = 'continuous';
    if (caps.whiteBalanceMode?.includes('continuous')) adv.whiteBalanceMode = 'continuous';
    if (Object.keys(adv).length) videoTrack.applyConstraints({ advanced: [adv] }).catch(() => {});

    // Hardware zoom
    if (caps.zoom) {
      hwZoomSupport = true;
      hwZoomMin     = caps.zoom.min ?? 1;
      hwZoomMax     = Math.min(caps.zoom.max ?? 6, 6);
    }

    // Fener
    if (caps.torch) torchBtn.style.display = 'flex';

    return video.play();
  })
  .then(() => requestAnimationFrame(loop))
  .catch(() => { statusEl.textContent = '⚠️ Kamera izni verilmedi.'; });

  // Fener
  torchBtn.addEventListener('click', () => {
    torchOn = !torchOn;
    torchBtn.classList.toggle('on', torchOn);
    torchBtn.textContent = torchOn ? '💡' : '🔦';
    if (videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(() => {});
  });

  // ── Ana döngü ─────────────────────────────────────────────
  // video buffer → ekran dönüşüm kaynak koordinatları
  // object-fit:cover eşdeğeri: video merkezini ekrana kaplama
  function coverSrc(sw, sh, vw, vh) {
    const S  = Math.max(sw / vw, sh / vh);   // cover ölçeği
    const srcW = sw / S;
    const srcH = sh / S;
    const srcX = (vw - srcW) / 2;
    const srcY = (vh - srcH) / 2;
    return { srcX, srcY, srcW, srcH };
  }

  let lastScan  = 0;
  const SCAN_MS = 80;
  let lastCropW = 0;
  let lastCropH = 0;

  function loop(ts) {
    if (!scanning) return;
    requestAnimationFrame(loop);

    if (video.readyState < video.HAVE_ENOUGH_DATA) return;
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return;

    const sw = display.width;
    const sh = display.height;

    // ── Ekrana çiz (zoom ile) ──────────────────────────────
    // hardware zoom zaten video stream'ini etkiler,
    // CSS zoom yok — canvas'a her zaman doğru boyutta çiziyoruz
    const { srcX, srcY, srcW, srcH } = coverSrc(sw, sh, vw, vh);

    // Zoom varsa, cover alanının merkezini Z'ye bölerek küçültürüz
    const Z       = hwZoomSupport ? 1.0 : currentZoom; // hw zoom → stream'de, css zoom → canvas'ta
    const zSrcW   = srcW / Z;
    const zSrcH   = srcH / Z;
    const zSrcX   = srcX + (srcW - zSrcW) / 2;
    const zSrcY   = srcY + (srcH - zSrcH) / 2;

    dCtx.drawImage(video, zSrcX, zSrcY, zSrcW, zSrcH, 0, 0, sw, sh);

    // ── QR tarama (her SCAN_MS ms) ────────────────────────
    if (ts - lastScan < SCAN_MS) return;
    lastScan = ts;

    // Ekran koordinatı → video buffer koordinatı (zoom hesaplı)
    // Ekran noktası (sx, sy) → video pikseli:
    //   vx = zSrcX + (sx / sw) * zSrcW
    //   vy = zSrcY + (sy / sh) * zSrcH
    const cropX = Math.round(zSrcX + (frameX / sw) * zSrcW);
    const cropY = Math.round(zSrcY + (frameY / sh) * zSrcH);
    const cropW = Math.round((frameSize / sw) * zSrcW);
    const cropH = Math.round((frameSize / sh) * zSrcH);

    if (cropW <= 0 || cropH <= 0) return;

    // Boyut değiştiğinde canvas'ı sıfırla (her seferinde değil — pahalı işlem)
    if (cropW !== lastCropW || cropH !== lastCropH) {
      canvas.width  = cropW;
      canvas.height = cropH;
      lastCropW = cropW;
      lastCropH = cropH;
    }
    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    const img  = ctx.getImageData(0, 0, cropW, cropH);
    const code = jsQR(img.data, cropW, cropH, { inversionAttempts: 'attemptBoth' });

    if (code && code.data) {
      scanning = false;
      successEl.classList.add('show');
      if (videoTrack) videoTrack.stop();
      setTimeout(() => tg.sendData(code.data), 700);
    }
  }
</script>
</body>
</html>
