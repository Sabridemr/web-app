<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QR Yoklama</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Video direkt gösteriliyor — canvas render loop yok */
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center center;
      will-change: transform;
    }

    #overlay-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Tarama çerçevesi */
    #frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 16px;
      overflow: hidden;
      pointer-events: none;
    }

    #scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4fc3f7, #00e5ff, #4fc3f7, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 8px #00e5ff;
    }
    @keyframes scan {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #00e5ff;
      border-style: solid;
      z-index: 2;
    }
    .corner.tl { top: -1px; left: -1px;  border-width: 3px 0 0 3px; border-radius: 8px 0 0 0; }
    .corner.tr { top: -1px; right: -1px; border-width: 3px 3px 0 0; border-radius: 0 8px 0 0; }
    .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 8px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; border-radius: 0 0 8px 0; }

    #title {
      position: absolute;
      top: 48px; left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 17px; font-weight: 600;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.3px;
      pointer-events: none;
    }

    #status {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      padding: 0 24px;
      pointer-events: none;
    }

    #zoom-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #zoom-indicator.show { opacity: 1; }

    #torch-btn {
      position: absolute;
      top: 48px; right: 20px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      font-size: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #torch-btn.on { background: rgba(255,220,0,0.35); }

    #success {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #success.show { display: flex; }

    .checkmark {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #4caf50;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    #success p     { color: #fff; font-size: 16px; font-weight: 600; }
    #success small { color: rgba(255,255,255,0.55); font-size: 13px; }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="frame">
    <div id="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="title">QR Kodu Tara</div>
  <button id="torch-btn">🔦</button>
  <div id="status">QR kodu çerçeve içine al</div>
  <div id="zoom-indicator">1.0×</div>

  <div id="success">
    <div class="checkmark">✓</div>
    <p>QR Okundu!</p>
    <small>Yoklama gönderiliyor...</small>
  </div>
</div>

<!-- Sadece QR tarama için gizli canvas -->
<canvas id="canvas" style="display:none"></canvas>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.disableClosingConfirmation();

  const video         = document.getElementById('video');
  const canvas        = document.getElementById('canvas');
  const overlayCanvas = document.getElementById('overlay-canvas');
  const statusEl      = document.getElementById('status');
  const successEl     = document.getElementById('success');
  const frameEl       = document.getElementById('frame');
  const torchBtn      = document.getElementById('torch-btn');
  const zoomIndicator = document.getElementById('zoom-indicator');
  const overlayCtx    = overlayCanvas.getContext('2d');
  const ctx           = canvas.getContext('2d', { willReadFrequently: true });

  let scanning      = true;
  let videoTrack    = null;
  let torchOn       = false;
  let frameSize     = 0;
  let frameX        = 0;
  let frameY        = 0;
  let currentZoom   = 1.0;
  let zoomHideTimer = null;

  // ── Overlay kurulumu (sadece resize'da çizilir, her frame'de değil) ──
  function setupFrame() {
    const sw = window.innerWidth;
    const sh = window.innerHeight;

    overlayCanvas.width  = sw;
    overlayCanvas.height = sh;

    frameSize = Math.round(Math.min(sw, sh) * 0.68);
    frameEl.style.width  = frameSize + 'px';
    frameEl.style.height = frameSize + 'px';
    frameX = Math.round((sw - frameSize) / 2);
    frameY = Math.round((sh - frameSize) / 2);
    statusEl.style.top = (frameY + frameSize + 18) + 'px';

    overlayCtx.fillStyle = 'rgba(0,0,0,0.55)';
    overlayCtx.fillRect(0, 0, sw, sh);
    overlayCtx.clearRect(frameX, frameY, frameSize, frameSize);
  }

  window.addEventListener('resize', setupFrame);
  setupFrame();

  // ── Zoom: sadece CSS transform — kameraya hiç dokunma ────────
  let pinchActive = false;
  const ZOOM_MAX = 5.0;

  function setZoom(z) {
    z = Math.max(1.0, Math.min(ZOOM_MAX, z));
    currentZoom = z;
    video.style.transform = `scale(${z})`;

    zoomIndicator.textContent = z.toFixed(1) + '×';
    zoomIndicator.classList.add('show');
    clearTimeout(zoomHideTimer);
    zoomHideTimer = setTimeout(() => zoomIndicator.classList.remove('show'), 1500);
  }

  // ── Pinch-to-zoom ─────────────────────────────────────────────
  let pinchDist0 = null;
  let pinchZoom0 = 1.0;

  function touchDist(t1, t2) {
    return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  }

  document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchDist0  = touchDist(e.touches[0], e.touches[1]);
      pinchZoom0  = currentZoom;
      pinchActive = true;
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && pinchDist0 !== null) {
      const ratio   = touchDist(e.touches[0], e.touches[1]) / pinchDist0;
      const newZoom = Math.max(1.0, Math.min(ZOOM_MAX, pinchZoom0 * ratio));
      if (Math.abs(newZoom - currentZoom) >= 0.01) setZoom(newZoom);
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (e.touches.length < 2) {
      pinchActive = false;
      pinchDist0  = null;
    }
  }, { passive: true });

  // ── Kamerayı başlat ──────────────────────────────────────────
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: 'environment' },
      width:  { ideal: 1280 },
      height: { ideal: 720 },
      frameRate: { ideal: 30, max: 30 }
    }
  })
  .catch(() => navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' } }
  }))
  .then(stream => {
    video.srcObject = stream;
    videoTrack = stream.getVideoTracks()[0];

    const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};

    const adv = {};
    if (caps.focusMode?.includes('continuous'))        adv.focusMode        = 'continuous';
    if (caps.exposureMode?.includes('continuous'))     adv.exposureMode     = 'continuous';
    if (caps.whiteBalanceMode?.includes('continuous')) adv.whiteBalanceMode = 'continuous';
    if (Object.keys(adv).length) videoTrack.applyConstraints({ advanced: [adv] }).catch(() => {});

    if (caps.torch) torchBtn.style.display = 'flex';

    return video.play();
  })
  .then(() => scanLoop())
  .catch(() => { statusEl.textContent = '⚠️ Kamera izni verilmedi.'; });

  // Fener
  torchBtn.addEventListener('click', () => {
    torchOn = !torchOn;
    torchBtn.classList.toggle('on', torchOn);
    torchBtn.textContent = torchOn ? '💡' : '🔦';
    if (videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(() => {});
  });

  // ── QR Tarama döngüsü (setTimeout, rAF yok) ──────────────────
  function scanLoop() {
    if (!scanning) return;
    setTimeout(scanLoop, 150);

    if (video.readyState < video.HAVE_ENOUGH_DATA) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return;

    const sw = window.innerWidth;
    const sh = window.innerHeight;

    // Ekrandaki frame kutusunun video koordinatlarına karşılığı
    // CSS scale ile zoom yapılıyor: currentZoom büyütme oranı
    // Video cover scale faktörü
    const S    = Math.max(sw / vw, sh / vh);
    const visW = sw / S;                       // ekranda görünen video genişliği (px)
    const visH = sh / S;
    const visX = (vw - visW) / 2;             // sol kenar video offseti
    const visY = (vh - visH) / 2;

    // CSS zoom ile merkez etrafında crop
    const Z      = currentZoom;
    const zVisW  = visW / Z;
    const zVisH  = visH / Z;
    const zVisX  = visX + (visW - zVisW) / 2;
    const zVisY  = visY + (visH - zVisH) / 2;

    // Frame kutusunu video koordinatına çevir
    const cropX = Math.round(zVisX + (frameX / sw) * zVisW);
    const cropY = Math.round(zVisY + (frameY / sh) * zVisH);
    const cropW = Math.round((frameSize / sw) * zVisW);
    const cropH = Math.round((frameSize / sh) * zVisH);

    if (cropW <= 0 || cropH <= 0) return;

    canvas.width  = cropW;
    canvas.height = cropH;
    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    const img  = ctx.getImageData(0, 0, cropW, cropH);
    const code = jsQR(img.data, cropW, cropH, { inversionAttempts: 'attemptBoth' });

    if (code && code.data) {
      scanning = false;
      successEl.classList.add('show');
      if (videoTrack) videoTrack.stop();
      setTimeout(() => tg.sendData(code.data), 700);
    }
  }
</script>
</body>
</html>
