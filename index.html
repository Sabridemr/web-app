<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Yoklama</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Köşe çerçevesi — sadece köşeler, ortası tamamen açık */
    .corner {
      position: absolute;
      width: 44px;
      height: 44px;
      border-color: #fff;
      border-style: solid;
      opacity: 0.9;
    }
    .corner.tl { top: 30%;  left: 10%;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 30%;  right: 10%; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 30%; left: 10%;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 30%; right: 10%; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    #status {
      position: absolute;
      bottom: 22%;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      padding: 0 20px;
    }

    #title {
      position: absolute;
      top: 50px;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    /* Başarı ekranı */
    #success {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #success.show { display: flex; }

    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #4caf50;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    #success p {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    #success small {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>

  <div id="title">QR Kodu Tara</div>

  <!-- Köşe çerçevesi -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="status">Kamerayı QR koda tut — yakınlaştırmak için sıkıştır</div>

  <div id="success">
    <div class="checkmark">✓</div>
    <p>QR Okundu!</p>
    <small>Yoklama gönderiliyor...</small>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.disableClosingConfirmation();

  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const status  = document.getElementById('status');
  const success = document.getElementById('success');
  const ctx     = canvas.getContext('2d');

  let scanning = true;

  // En yüksek kalitede arka kamera
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 3840 },
      height: { ideal: 2160 }
    }
  })
  .then(stream => {
    video.srcObject = stream;
    video.play();
    requestAnimationFrame(taraFrame);
  })
  .catch(err => {
    status.textContent = '⚠️ Kamera izni verilmedi.';
    console.error(err);
  });

  function taraFrame() {
    if (!scanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });

      if (code && code.data) {
        scanning = false;
        success.classList.add('show');

        video.srcObject.getTracks().forEach(t => t.stop());

        setTimeout(() => {
          tg.sendData(code.data);
        }, 800);
        return;
      }
    }

    requestAnimationFrame(taraFrame);
  }
</script>

</body>
</html>
